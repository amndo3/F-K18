<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARIS - KAMAL</title>
    <link rel="icon" type="image/svg+xml" href="Untitled-1-3.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0a1a5a 0%, #efeef8 25%, #150d7c 50%, #08073a 75%, #686d9e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cursor مخصص */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease;
        }

        .cursor.hover {
            transform: scale(2);
            background: rgba(255, 107, 107, 0.8);
        }

        /* الـ Container الرئيسي */
        .main-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 40px;
        }

        /* الصورة الرئيسية */
        .logo-img {
            width: clamp(200px, 40vw, 450px);
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* قسم روابط التواصل */
        .social-section {
            background: rgba(34, 22, 150, 0.616);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: clamp(30px, 8vw, 50px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 1000px;
            width: 100%;
            text-align: center;
            animation: slideUp 1s ease-out;
        }

        .title {
            font-size: clamp(2rem, 6vw, 3rem);
            background: linear-gradient(45deg, #fff, #a8e6cf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-bottom: 30px;
        }

        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(15px, 4vw, 25px);
            justify-content: center;
        }

        .social-link {
            width: clamp(80px, 18vw, 110px);
            height: clamp(80px, 18vw, 110px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-decoration: none;
            font-size: clamp(1.5rem, 4vw, 2rem);
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .social-link:hover::before {
            left: 100%;
        }

        .social-link:hover {
            transform: translateY(-15px) scale(1.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* ألوان المنصات */
        .kick { background: linear-gradient(45deg, #10c23c, #134915); }
        .tiktok { background: linear-gradient(45deg, #000, #4b4747); }
        .youtube { background: linear-gradient(45deg, #701515, #cc0000); }
        .x { background: linear-gradient(45deg, #000, #39464e); }
        .discord { background: linear-gradient(45deg, #5865f2, #4752c4); }

        /* إحصائيات البث */
        .stats-section {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
            width: 100%;
        }

        .stats-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            color: white;
            min-width: 200px;
            flex: 1;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideUp 1.2s ease-out;
        }

        .live-indicator {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 12px;
            height: 12px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff4444;
            animation: pulse 2s infinite;
        }

        .stats-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #a8e6cf;
        }

        .stat-number {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* الرسوم المتحركة */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
        }

        /* التجاوب مع الشاشات 📱 */
        @media (max-width: 768px) {
            .main-container {
                padding: 15px;
                gap: 25px;
            }
            
            .social-links {
                gap: 15px;
            }
            
            .social-link {
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }
            
            .stats-section {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .social-section {
                padding: 25px 20px;
            }
            
            .title {
                font-size: 1.8rem;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            .social-link:hover {
                transform: none;
                box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>
<body>
    <!-- Cursor مخصص -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <div class="main-container">
        <!-- الشعار الرئيسي -->
        <img src="Untitled-1-3.svg" alt="FARIS KAMAL" class="logo-img">

        <!-- روابط التواصل -->
        <div class="social-section">
            <h1 class="title" id="dynamicTitle">FARIS - KAMAL</h1>
            <p class="subtitle">تابعني في منصات التواصل الاجتماعي</p>
            
            <div class="social-links">
                <a href="https://kick.com/fari_s17" class="social-link kick" target="_blank" rel="noopener">
                    <i class="fas fa-gamepad"></i>
                    <img src="Kick Logo.svg" alt="Kick" width="35" height="15">
                </a>
                
                <a href="https://www.tiktok.com/@faris_kamal_1" class="social-link tiktok" target="_blank" rel="noopener">
                    <i class="fab fa-tiktok"></i>
                </a>
                
                <a href="https://www.youtube.com/@Faris_kamal" class="social-link youtube" target="_blank" rel="noopener">
                    <i class="fab fa-youtube"></i>
                </a>
                
                <a href="https://x.com/farisxxl" class="social-link x" target="_blank" rel="noopener">
                    <i class="fab fa-x-twitter"></i>
                    <img src="svgexport-1.svg" width="35" height="20">
                </a>
                
                <a href="https://discord.gg/JTRNN59E" class="social-link discord" target="_blank" rel="noopener">
                    <i class="fab fa-discord"></i>
                </a>
            </div>
        </div>

        <!-- إحصائيات البث -->
        <div class="stats-section">
            <div class="stats-card" style="position: relative;">
                <div class="live-indicator"></div>
                <div class="stats-title">إحصائيات البث</div>
                <span class="stat-number" id="views">930</span>
                <span class="stat-label">مشاهدات اليوم</span>
            </div>
            <div class="stats-card">
                <div class="stats-title">المتابعين</div>
                <span class="stat-number" id="subs">510</span>
                <span class="stat-label">إجمالي المتابعين</span>
            </div>
        </div>
    </div>

    <script>
        // Cursor مخصص
        const cursor = document.getElementById('cursor');
        const cursorFollower = document.getElementById('cursorFollower');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0, followerX = 0, followerY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function updateCursor() {
            cursorX += (mouseX - cursorX) * 0.2;
            cursorY += (mouseY - cursorY) * 0.2;
            followerX += (mouseX - followerX) * 0.1;
            followerY += (mouseY - followerY) * 0.1;

            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            cursorFollower.style.left = followerX + 'px';
            cursorFollower.style.top = followerY + 'px';

            requestAnimationFrame(updateCursor);
        }

        // تأثيرات تفاعلية
        document.querySelectorAll('.social-link, .stats-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        document.addEventListener('mousedown', () => cursor.classList.add('click'));
        document.addEventListener('mouseup', () => cursor.classList.remove('click'));

        // تأثير النص المتحرك
        const title = document.getElementById('dynamicTitle');
        setTimeout(() => {
            title.textContent = 'يا هلا وسهلا';
            setTimeout(() => title.textContent = 'FARIS - KAMAL', 2000);
        }, 1000);

        updateCursor();
    </script>
</body>
</html>
